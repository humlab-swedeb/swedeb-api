name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty for latest staging build)'
        required: false
        type: string

jobs:
  build-staging:
    name: Build and Tag Staging Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
  
      - name: Install uv
        run: pipx install uv

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(uv version | awk '{print $NF}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building staging image for version: ${VERSION} from staging branch"

      - name: Login to GitHub Container Registry
        run: |
          if [ -n "${{ secrets.CWB_REGISTRY_TOKEN }}" ]; then
            echo "${{ secrets.CWB_REGISTRY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          else
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          fi

      - name: Build and push staging image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          CWB_REGISTRY_TOKEN: ${{ secrets.CWB_REGISTRY_TOKEN }}
        run: ./.github/scripts/build-and-push-image.sh "${{ steps.get_version.outputs.version }}" staging

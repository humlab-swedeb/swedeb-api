services:
  swedeb_api:
    image: "${SWEDEB_IMAGE_NAME}:${SWEDEB_IMAGE_TAG}"
    container_name: "${SWEDEB_CONTAINER_NAME}-${SWEDEB_ENVIRONMENT}"
    restart: always
    ports:
      - "${SWEDEB_HOST_PORT}:${SWEDEB_PORT}"
    env_file:
      - .env
    environment:
      - SWEDEB_CONFIG_PATH=${SWEDEB_CONFIG_PATH}
      - SWEDEB_DATA_FOLDER=${SWEDEB_DATA_FOLDER}
      # Optional: Override auto-detected frontend version
      # Defaults based on GIT_BRANCH: main→latest, staging→staging, test→test
      # Uncomment to use specific version:
      # - FRONTEND_VERSION=latest
      # - FRONTEND_VERSION=staging
      # - FRONTEND_VERSION=1.2.3
    volumes:
      - "${SWEDEB_DATA_FOLDER}:/data"
      - "${SWEDEB_METADATA_FILENAME}:/data/riksprot_metadata.${METADATA_VERSION}.db"
      # Optional: For offline deployment or network issues, place frontend tarball at:
      #   ${SWEDEB_DATA_FOLDER}/dist/frontend-${FRONTEND_VERSION}.tar.gz
      # The download script will use it as fallback if GitHub is unreachable
    networks:
      - swedeb_app_network

networks:
  swedeb_app_network:
    name: "swedeb_${SWEDEB_ENVIRONMENT}_network"
    driver: bridge

# /etc/nginx/sites-available/{swedeb-url.se} (or wherever your file is)

server {
    listen 443 ssl; # managed by Certbot
    server_name {swedeb-url.se};

    ssl_certificate /etc/letsencrypt/live/{swedeb-url.se}/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/{swedeb-url.se}/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    access_log /var/log/nginx/{swedeb-url.se}_access.log;
    error_log  /var/log/nginx/{swedeb-url.se}_error.log;

    # --- REDIRECTION LOGIC ---
    #location = / {
    #    return 301 /public/index.html#/;
    #}
    # --- END REDIRECTION LOGIC ---

    # Your existing proxy pass or static file serving for other paths
    location / {
        # If you are proxying to your backend application:
        proxy_pass http://localhost:8098; # Ensure this is correct
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # You might have other specific location blocks here
}

# HTTP to HTTPS redirect (this block should remain as is)
server {
    listen 80;
    server_name {swedeb-url.se};

    access_log /var/log/nginx/{swedeb-url.se}_access.log;
    error_log  /var/log/nginx/{swedeb-url.se}_error.log;

    return 301 https://$host$request_uri;
}
# Local testing docker-compose file
# Usage: docker compose -f compose.local.yml up
#
# This file uses local build and simplified configuration for testing

services:
  swedeb_api_local:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT_BRANCH: dev
        FRONTEND_VERSION: staging
    container_name: swedeb-api-local-test
    ports:
      - "8092:8092"
    environment:
      - SWEDEB_CONFIG_PATH=/data/config.yml
      - SWEDEB_DATA_FOLDER=/data
      - FRONTEND_VERSION=staging
      - CORPUS_REGISTRY=/data/registry
      - CONFIG_FILE=/data/config.yml
    volumes:
      # Map local data directory
      - ../data:/data:Z
      # Optional: for testing fallback, create ./test-data/dist/frontend-staging.tar.gz
      - ./test-data/dist:/data/dist:Z,ro
      # Optional: mount frontend assets directory to debug
      # - ./test-data/public:/app/public:Z
    networks:
      - swedeb_local_network
    # Remove restart policy for easier debugging
    # restart: always

networks:
  swedeb_local_network:
    name: swedeb_local_test_network
    driver: bridge
